name: ihg
vendor: IHG
detection_signals:
  url_patterns:
    - "ihg\\.com"
    - "ihgmerlin"
    - "intercontinental"
  html_signals:
    - "IHG"
    - "InterContinental"
    - "Holiday Inn"
    - "name=.room"
    - "name=.lastName"
  min_signals: 2
solve_strategy:
  action_url_pattern: "/login"
  method: POST
  fields:
    room: "{vault.room_number}"
    lastName: "{vault.last_name}"
  checkboxes:
    - acceptTerms
