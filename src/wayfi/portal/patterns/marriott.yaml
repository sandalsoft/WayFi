name: marriott
vendor: Marriott
detection_signals:
  url_patterns:
    - "marriott"
    - "bonvoy"
    - "marriottwifi"
  html_signals:
    - "marriott"
    - "Bonvoy"
    - "name=.room"
    - "name=.lastName"
    - "Welcome to Marriott"
  min_signals: 2
solve_strategy:
  action_url_pattern: "/login"
  method: POST
  fields:
    room: "{vault.room_number}"
    lastName: "{vault.last_name}"
  checkboxes:
    - acceptTerms
