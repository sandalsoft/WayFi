<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayFi — {% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">WayFi</a>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/vault">Vault</a>
            <a href="/networks">Networks</a>
            <a href="/patterns">Patterns</a>
            <a href="/settings">Settings</a>
            <a href="/logs">Logs</a>
        </div>
        <div class="nav-status">
            <span class="status-dot" id="nav-dot"></span>
            <span id="nav-state">--</span>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/main.js"></script>
    <script>
    async function updateNavStatus() {
        try {
            const r = await fetch('/api/status')
            const d = await r.json()
            const dot = document.getElementById('nav-dot')
            const label = document.getElementById('nav-state')
            const state = d.state || 'unknown'
            label.textContent = d.ssid ? d.ssid : state
            dot.className = 'status-dot'
            if (state === 'MONITOR' || state === 'POST_AUTH') dot.classList.add('connected')
            else if (state === 'SOLVE_PORTAL' || state === 'DETECT_PORTAL') dot.classList.add('solving')
            else if (state === 'unknown') dot.classList.add('error')
        } catch(e) {}
    }
    updateNavStatus()
    setInterval(updateNavStatus, 5000)
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
